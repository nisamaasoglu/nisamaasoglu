<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 8" width="1200" height="8" preserveAspectRatio="none" role="img" aria-label="divider">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00E5C7" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#00E5C7" stop-opacity="1"/>
      <stop offset="42%"  stop-color="#A78BFA" stop-opacity="1"/>
      <stop offset="62%"  stop-color="#FFB454" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#00E5C7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00E5C7" stop-opacity="0"/>
    </linearGradient>
